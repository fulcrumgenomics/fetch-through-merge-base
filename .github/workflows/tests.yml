name: tests

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "!**"
  workflow_call:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20.x
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: npm ci
      - run: npm run build
      - run: npm run format-check
      - run: npm run lint
      - name: Verify no unstaged changes
        shell: bash
        run: |
          if [[ "$(git status --porcelain)" != "" ]]; then
            echo ----------------------------------------
            echo git status
            echo ----------------------------------------
            git status
            echo ----------------------------------------
            echo git diff
            echo ----------------------------------------
            git diff
            echo ----------------------------------------
            echo Troubleshooting
            echo ----------------------------------------
            echo "::error::Unstaged changes detected. Locally try running: git clean -ffdx && npm ci && npm run format && npm run build"
            exit 1
          fi
  testing:
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04, macos-15, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - name: Test main versus main
      uses: ./.github/actions/testing
      with:
        base-ref: "main"
        head-ref: "main"
        ancestor-ref: "6eb785672d2c6770af9e985d36ddcd1b3a285f8e"
    - name: Test the non-fetched remote branch versus itself
      uses: ./.github/actions/testing
      with:
        base-ref: "test-0001-base-ref"
        head-ref: "test-0001-base-ref"
        ancestor-ref: "184170635f898a6d9ec476a9ea9f0f7fdefb4f64"
    - name: Test head-ref fallback
      uses: ./.github/actions/testing
      with:
        head-ref: ""
        base-ref: "test-0001-base-ref"
        fallback-head-ref: "test-0001-head-ref"
        ancestor-ref: "6eb785672d2c6770af9e985d36ddcd1b3a285f8e"
    - name: Test base-ref fallback to defaults to main
      uses: ./.github/actions/testing
      with:
        head-ref: "test-0001-head-ref"
        base-ref: ""
        ancestor-ref: "6eb785672d2c6770af9e985d36ddcd1b3a285f8e"
    - name: Test `fail-after` is not triggered (branches)
      uses: ./.github/actions/testing
      with:
        head-ref: "test-0001-base-ref"
        base-ref: "test-0001-head-ref"
        deepen-length: 1
        fail-after: 3
        ancestor-ref: "6eb785672d2c6770af9e985d36ddcd1b3a285f8e"
    - name: Test `fail-after` is not triggered (sha1)
      uses: ./.github/actions/testing
      with:
        head-ref: "184170635f898a6d9ec476a9ea9f0f7fdefb4f64"
        base-ref: "e649b76f3085b2364ab2a834e43ae6fd74a33fa9"
        deepen-length: 1
        fail-after: 3
        ancestor-ref: "6eb785672d2c6770af9e985d36ddcd1b3a285f8e"
    - name: Test `fail-after` is triggered
      id: test_fail-after
      uses: ./.github/actions/testing
      with:
        head-ref: "test-0001-base-ref"
        base-ref: "test-0001-head-ref"
        deepen-length: 1
        fail-after: 2
        ancestor-ref: ""
    - name: Test `fallback-fetch-all`
      uses: ./.github/actions/testing
      with:
        head-ref: "test-0001-base-ref"
        base-ref: "test-0001-head-ref"
        deepen-length: 1
        fail-after: 2
        fallback-fetch-all: true
        ancestor-ref: "6eb785672d2c6770af9e985d36ddcd1b3a285f8e"
    # Regression test for the parent-parsing bug fixed in this PR: the tip of
    # test-0002-parent-in-body has a commit message body whose lines start with
    # "parent ", which the old `git cat-file -p | grep '^parent'` pipeline would
    # misinterpret as a parent-header line and attempt to fetch.
    - name: Test parent-like text in commit body
      uses: ./.github/actions/testing
      with:
        base-ref: "main"
        head-ref: "test-0002-parent-in-body"
        ancestor-ref: "6eb785672d2c6770af9e985d36ddcd1b3a285f8e"
