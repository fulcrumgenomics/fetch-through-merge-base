name: tests

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "!**"
  workflow_call:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20.x
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: npm ci
      - run: npm run build
      - run: npm run format-check
      - run: npm run lint
      - name: Verify no unstaged changes
        shell: bash
        run: |
          if [[ "$(git status --porcelain)" != "" ]]; then
            echo ----------------------------------------
            echo git status
            echo ----------------------------------------
            git status
            echo ----------------------------------------
            echo git diff
            echo ----------------------------------------
            git diff
            echo ----------------------------------------
            echo Troubleshooting
            echo ----------------------------------------
            echo "::error::Unstaged changes detected. Locally try running: git clean -ffdx && npm ci && npm run format && npm run build"
            exit 1
          fi
  shellcheck:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - name: Install shellcheck
      run: sudo apt-get update && sudo apt-get install -y shellcheck
    - name: Run shellcheck
      run: |
        shellcheck \
          -x \
          --severity=style \
          --source-path=SCRIPTDIR \
          src/scripts/*.sh \
          tests/*.sh
  shell-tests:
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04, macos-15, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - name: Setup gha-timer
      uses: fulcrumgenomics/gha-timer@d0d886fa587c7f4f714e64d84aa6e274e818d48b # v1.1.1
      with:
        skip-banner: true
    - name: Run shell unit tests
      shell: bash
      run: |
        set -euo pipefail
        # shellcheck disable=SC1091
        source src/scripts/gha_timer_wrapper.sh
        for t in tests/test_*.sh; do
          gha_timer start --name "${t}"
          if bash "${t}"; then
            gha_timer elapsed --outcome success --name "${t}"
          else
            status=$?
            gha_timer elapsed --outcome failure --name "${t}"
            exit "${status}"
          fi
        done
  testing:
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04, macos-15, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - name: Test main versus main
      uses: ./.github/actions/testing
      with:
        base-ref: "main"
        head-ref: "main"
        ancestor-ref: "6eb785672d2c6770af9e985d36ddcd1b3a285f8e"
    - name: Test the non-fetched remote branch versus itself
      uses: ./.github/actions/testing
      with:
        base-ref: "test-0001-base-ref"
        head-ref: "test-0001-base-ref"
        ancestor-ref: "184170635f898a6d9ec476a9ea9f0f7fdefb4f64"
    - name: Test head-ref fallback
      uses: ./.github/actions/testing
      with:
        head-ref: ""
        base-ref: "test-0001-base-ref"
        fallback-head-ref: "test-0001-head-ref"
        ancestor-ref: "6eb785672d2c6770af9e985d36ddcd1b3a285f8e"
    - name: Test base-ref fallback to defaults to main
      uses: ./.github/actions/testing
      with:
        head-ref: "test-0001-head-ref"
        base-ref: ""
        ancestor-ref: "6eb785672d2c6770af9e985d36ddcd1b3a285f8e"
    - name: Test `fail-after` is not triggered (branches)
      uses: ./.github/actions/testing
      with:
        head-ref: "test-0001-base-ref"
        base-ref: "test-0001-head-ref"
        deepen-length: 1
        fail-after: 3
        ancestor-ref: "6eb785672d2c6770af9e985d36ddcd1b3a285f8e"
    - name: Test `fail-after` is not triggered (sha1)
      uses: ./.github/actions/testing
      with:
        head-ref: "184170635f898a6d9ec476a9ea9f0f7fdefb4f64"
        base-ref: "e649b76f3085b2364ab2a834e43ae6fd74a33fa9"
        deepen-length: 1
        fail-after: 3
        ancestor-ref: "6eb785672d2c6770af9e985d36ddcd1b3a285f8e"
    - name: Test `fail-after` is triggered
      id: test_fail-after
      uses: ./.github/actions/testing
      with:
        head-ref: "test-0001-base-ref"
        base-ref: "test-0001-head-ref"
        deepen-length: 1
        fail-after: 2
        ancestor-ref: ""
    - name: Test `fallback-fetch-all`
      uses: ./.github/actions/testing
      with:
        head-ref: "test-0001-base-ref"
        base-ref: "test-0001-head-ref"
        deepen-length: 1
        fail-after: 2
        fallback-fetch-all: true
        ancestor-ref: "6eb785672d2c6770af9e985d36ddcd1b3a285f8e"
    # Regression test for the parent-parsing bug fixed in this PR: the tip of
    # test-0002-parent-in-body has a commit message body whose lines start with
    # "parent ", which the old `git cat-file -p | grep '^parent'` pipeline would
    # misinterpret as a parent-header line and attempt to fetch.
    - name: Test parent-like text in commit body
      uses: ./.github/actions/testing
      with:
        base-ref: "main"
        head-ref: "test-0002-parent-in-body"
        ancestor-ref: "6eb785672d2c6770af9e985d36ddcd1b3a285f8e"
    # Exercises the enable-timing=false opt-out: the setup-gha-timer step is
    # skipped and the shared wrapper falls back to ::group::/::endgroup::
    # workflow commands.  The merge-base result must be unchanged.
    - name: Test enable-timing opt-out
      uses: ./.github/actions/testing
      with:
        head-ref: "test-0001-head-ref"
        base-ref: "test-0001-base-ref"
        enable-timing: false
        ancestor-ref: "6eb785672d2c6770af9e985d36ddcd1b3a285f8e"
